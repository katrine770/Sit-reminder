<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>起来动一动</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #666;
    --ring-size: 220px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 40% at 50% 0%, #1a1f0a 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 80% 80%, #1a0d07 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    padding: 20px;
    width: 100%;
    max-width: 420px;
  }

  header {
    text-align: center;
  }

  h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(232, 255, 71, 0.3);
  }

  .subtitle {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* Timer Ring */
  .ring-wrapper {
    position: relative;
    width: var(--ring-size);
    height: var(--ring-size);
  }

  .ring-svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .ring-bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 6;
  }

  .ring-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 628;
    stroke-dashoffset: 628;
    transition: stroke-dashoffset 1s linear;
    filter: drop-shadow(0 0 8px rgba(232,255,71,0.6));
  }

  .ring-progress.warning {
    stroke: var(--accent2);
    filter: drop-shadow(0 0 8px rgba(255,107,53,0.6));
  }

  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .time-display {
    font-size: 3rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
    transition: color 0.3s;
  }

  .time-display.warning { color: var(--accent2); }

  .time-label {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    margin-top: 6px;
    transition: background 0.3s;
  }

  .status-dot.active {
    background: var(--accent);
    box-shadow: 0 0 10px rgba(232,255,71,0.8);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.8); }
  }

  /* Interval Selector */
  .interval-section {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
  }

  .section-label {
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .interval-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .interval-value {
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    min-width: 60px;
    text-align: center;
    line-height: 1;
  }

  .interval-unit {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px rgba(232,255,71,0.5);
    cursor: pointer;
    transition: transform 0.15s;
  }

  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  /* Preset buttons */
  .presets {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }

  .preset-btn {
    flex: 1;
    padding: 7px 0;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .preset-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .preset-btn.active {
    background: rgba(232,255,71,0.08);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    width: 100%;
  }

  .btn {
    flex: 1;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: #0d0d0d;
    box-shadow: 0 4px 24px rgba(232,255,71,0.25);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(232,255,71,0.35);
  }

  .btn-secondary {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  /* Stats */
  .stats {
    display: flex;
    gap: 12px;
    width: 100%;
  }

  .stat-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    text-align: center;
  }

  .stat-value {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Alert overlay */
  .alert-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .alert-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .alert-card {
    background: var(--surface);
    border: 1px solid var(--accent2);
    border-radius: 24px;
    padding: 48px 40px;
    text-align: center;
    max-width: 320px;
    box-shadow: 0 0 80px rgba(255,107,53,0.2);
    animation: alertPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes alertPop {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .alert-icon {
    font-size: 3.5rem;
    display: block;
    margin-bottom: 16px;
    animation: bounce 0.6s ease infinite alternate;
  }

  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-8px); }
  }

  .alert-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent2);
    margin-bottom: 8px;
    letter-spacing: 0.1em;
  }

  .alert-msg {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.8;
  }

  .alert-dismiss {
    background: var(--accent2);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px 40px;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .alert-dismiss:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 20px rgba(255,107,53,0.4);
  }

  /* Permission notice */
  .notice {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-align: center;
    opacity: 0.7;
    line-height: 1.6;
  }

  .notice span {
    color: var(--accent);
    cursor: pointer;
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>起来动一动</h1>
    <div class="subtitle">Sit Less · Move More · Feel Better</div>
  </header>

  <div class="ring-wrapper">
    <svg class="ring-svg" viewBox="0 0 220 220">
      <circle class="ring-bg" cx="110" cy="110" r="100"/>
      <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="100"/>
    </svg>
    <div class="ring-center">
      <div class="time-display" id="timeDisplay">--:--</div>
      <div class="time-label">剩余时间</div>
      <div class="status-dot" id="statusDot"></div>
    </div>
  </div>

  <div class="interval-section">
    <div class="section-label">提醒间隔</div>
    <div class="interval-row">
      <div>
        <div class="interval-value" id="intervalDisplay">30</div>
        <div class="interval-unit">分钟</div>
      </div>
      <input type="range" id="intervalSlider" min="5" max="120" step="5" value="30">
    </div>
    <div class="presets">
      <button class="preset-btn" onclick="setPreset(10)">10 分</button>
      <button class="preset-btn active" onclick="setPreset(30)">30 分</button>
      <button class="preset-btn" onclick="setPreset(45)">45 分</button>
      <button class="preset-btn" onclick="setPreset(60)">60 分</button>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">▶ 开始</button>
    <button class="btn btn-secondary" id="resetBtn" onclick="resetTimer()">↺ 重置</button>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="reminderCount">0</div>
      <div class="stat-label">今日提醒</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="sessionTime">0</div>
      <div class="stat-label">运行分钟</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="intervalInfo">30m</div>
      <div class="stat-label">当前间隔</div>
    </div>
  </div>

  <div class="notice" id="noticeEl">
    浏览器通知未开启 — <span onclick="requestNotif()">点击授权</span> 以在后台接收提醒
  </div>
</div>

<!-- Alert Overlay -->
<div class="alert-overlay" id="alertOverlay">
  <div class="alert-card">
    <span class="alert-icon">🧍</span>
    <div class="alert-title">起来动一动！</div>
    <div class="alert-msg">
      你已久坐太久了<br>
      站起来走走、伸展一下<br>
      让身体放松 5 分钟 ☀️
    </div>
    <button class="alert-dismiss" onclick="dismissAlert()">好的，动起来！</button>
  </div>
</div>

<script>
  let intervalMinutes = 30;
  let totalSeconds = 30 * 60;
  let remainingSeconds = totalSeconds;
  let isRunning = false;
  let ticker = null;
  let reminderCount = 0;
  let sessionStartTime = null;
  let notifGranted = false;

  const circumference = 2 * Math.PI * 100; // ~628

  const ringProgress = document.getElementById('ringProgress');
  const timeDisplay = document.getElementById('timeDisplay');
  const statusDot = document.getElementById('statusDot');
  const startBtn = document.getElementById('startBtn');
  const intervalSlider = document.getElementById('intervalSlider');
  const intervalDisplay = document.getElementById('intervalDisplay');
  const reminderCountEl = document.getElementById('reminderCount');
  const sessionTimeEl = document.getElementById('sessionTime');
  const intervalInfoEl = document.getElementById('intervalInfo');
  const noticeEl = document.getElementById('noticeEl');

  // Check notification permission on load
  if ('Notification' in window) {
    if (Notification.permission === 'granted') {
      notifGranted = true;
      noticeEl.style.display = 'none';
    }
  } else {
    noticeEl.textContent = '此浏览器不支持通知功能';
  }

  function requestNotif() {
    if ('Notification' in window) {
      Notification.requestPermission().then(p => {
        if (p === 'granted') {
          notifGranted = true;
          noticeEl.style.display = 'none';
        }
      });
    }
  }

  function updateRing() {
    const fraction = remainingSeconds / totalSeconds;
    const offset = circumference * (1 - fraction);
    ringProgress.style.strokeDashoffset = offset;

    const isWarning = remainingSeconds <= 60 && remainingSeconds > 0;
    ringProgress.classList.toggle('warning', isWarning);
    timeDisplay.classList.toggle('warning', isWarning);
  }

  function updateDisplay() {
    const m = Math.floor(remainingSeconds / 60);
    const s = remainingSeconds % 60;
    timeDisplay.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    updateRing();
  }

  function toggleTimer() {
    if (isRunning) {
      pauseTimer();
    } else {
      startTimer();
    }
  }

  function startTimer() {
    if (!sessionStartTime) sessionStartTime = Date.now();
    isRunning = true;
    startBtn.textContent = '⏸ 暂停';
    statusDot.classList.add('active');
    ticker = setInterval(() => {
      if (remainingSeconds <= 0) {
        triggerReminder();
        return;
      }
      remainingSeconds--;
      updateDisplay();
      updateSessionTime();
    }, 1000);
  }

  function pauseTimer() {
    isRunning = false;
    startBtn.textContent = '▶ 继续';
    statusDot.classList.remove('active');
    clearInterval(ticker);
  }

  function resetTimer() {
    clearInterval(ticker);
    isRunning = false;
    remainingSeconds = totalSeconds;
    startBtn.textContent = '▶ 开始';
    statusDot.classList.remove('active');
    updateDisplay();
  }

  function triggerReminder() {
    clearInterval(ticker);
    isRunning = false;
    reminderCount++;
    reminderCountEl.textContent = reminderCount;
    startBtn.textContent = '▶ 开始';
    statusDot.classList.remove('active');

    // Show overlay
    document.getElementById('alertOverlay').classList.add('show');

    // Browser notification
    if (notifGranted) {
      new Notification('🧍 起来动一动！', {
        body: `你已久坐 ${intervalMinutes} 分钟了，站起来走走！`,
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="80" font-size="80">🧍</text></svg>'
      });
    }

    // Play beep sound
    playBeep();

    // Reset timer for next round
    remainingSeconds = totalSeconds;
    updateDisplay();
  }

  function dismissAlert() {
    document.getElementById('alertOverlay').classList.remove('show');
    // Auto restart
    startTimer();
  }

  function playBeep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [523, 659, 784, 1047];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.12);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.3);
        osc.start(ctx.currentTime + i * 0.12);
        osc.stop(ctx.currentTime + i * 0.12 + 0.3);
      });
    } catch(e) {}
  }

  function updateSessionTime() {
    if (sessionStartTime) {
      const elapsed = Math.floor((Date.now() - sessionStartTime) / 60000);
      sessionTimeEl.textContent = elapsed;
    }
  }

  function setPreset(min) {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    intervalSlider.value = min;
    setInterval_(min);
  }

  function setInterval_(min) {
    intervalMinutes = min;
    intervalDisplay.textContent = min;
    intervalInfoEl.textContent = min + 'm';
    totalSeconds = min * 60;
    if (!isRunning) {
      remainingSeconds = totalSeconds;
      updateDisplay();
    }
  }

  intervalSlider.addEventListener('input', () => {
    const val = parseInt(intervalSlider.value);
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    setInterval_(val);
  });

  // Init display
  updateDisplay();
</script>
</body>
</html>
